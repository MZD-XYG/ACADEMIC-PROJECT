<!DOCTYPE html>

<style>

*{
  box-sizing:border-box;
 /* outline:1px solid ;*/
}

body{
  background: #6F96D1;
  height: 100%;
  margin: 0;
  background-repeat: no-repeat;
  background-attachment: fixed;
}
.cursor {
    position: fixed;
    width: 50px;
    height: 50px;
    border: 1px solid #081f5c;
    border-radius: 50%;
    left: 0;
    top: 0;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: .1s;
    z-index: 15;
  }
  
  .cursor2 {
    position: fixed;
    width: 8px;
    height: 8px;
    background-color: #081f5c;
    border-radius: 50%;
    left: 0;
    top: 0;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: .15s;
    z-index: 15;
  }
a {
  color: #fff;
  text-decoration: none;
  transition: all 0.30s linear 0s;
}

.wrapper-1{
  width:100%;
  display: flex;
  flex-direction: column;
}
.wrapper-2{
  padding: 10px;
  text-align:center;
}
h1{
  font-family: 'Righteous';
  font-size: 30px;
  font-weight: 900;
  letter-spacing:3px;
  color: #fafafa;
  margin:0;
  margin-top: 30px;
  margin-bottom:30px;
}
.wrapper-2 p{
  margin:0;
  font-size:1.3em;
  color:#fafafa;
  font-family: 'Raleway', sans-serif;
  letter-spacing:1px;
  line-height: 1.5;
}
.go-home{
  background: hsl(206, 100%, 91%);
  border:none;
  padding: 15px 15px;
  margin: 30px 0;
  border-radius: 5px;
  cursor: pointer;
}
.go-home:hover{
  opacity: 0.9;
}
.go-home a{
  font-family: 'Righteous';
  font-size: 18px;
  font-weight: 700!important;
  text-transform: uppercase;
  letter-spacing: 2px;
  
}

a{
  color: #091F5B;
}

.go-home {
  background: hsl(206, 100%, 91%);
  border: none;
  padding: 15px 15px;
  margin: 30px 0;
  border-radius: 5px;
  cursor: pointer;
  transition: background-color 0.3s, transform 0.2s;
}

.go-home:hover {
  background-color: #75c3ff; 
}

.go-home:active {
  transform: translateY(2px); 
}

.go-home a {
  font-family: 'Righteous';
  font-size: 18px;
  font-weight: 700!important;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #091F5B;
  text-decoration: none;
}

@media (min-width: 2000px) {
.wrapper-2{
      margin-top: 40%;
      transform: scale(1.5);
}
}

@media (min-width:360px){
  h1{
    font-size:48px;
  }
  .wrapper-2 p{
    font-size: 20px;
  }
  .go-home{
    margin-bottom:20px;
  }
}

@media (min-width:600px){
  .thankyoucontent{
  max-width:1000px;
  margin:0 auto;
}
  .wrapper-1{
  height: initial;
  max-width:620px;
  margin:0 auto;
  margin-top:50px;
  }

.thankyoucontent{
   margin-top: 120px;
}  

@keyframes bounce {
    0%, 100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-20px);
    }
  }

  .thank {
    animation: bounce 1s infinite;
  }

}
footer {
  background-color: #0b1957;
  color: white;
  text-align: center;
  padding: 10px 0; 
  position: fixed; 
  bottom: 0;
  width: 100%; 
  box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.2); 
  z-index: 1000;
}

footer p {
  margin: 0;
  font-size: 14px; 
}

<script>
  var cursor = document.querySelector(".cursor");
  var cursor2 = document.querySelector(".cursor2");

    cursor.style.cssText = cursor2.style.cssText = "left: " + e.clientX + "px; top: " + e.clientY + "px;";
