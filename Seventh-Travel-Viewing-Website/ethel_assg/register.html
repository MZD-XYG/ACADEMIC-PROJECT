<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8"/>
	<title>Registration Form</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<link rel="stylesheet" href="register_style.css"/>
	<link href='https://fonts.googleapis.com/css?family=Courgette' rel='stylesheet'>
	<link href='https://fonts.googleapis.com/css?family=Kalam' rel='stylesheet'>
	<link href='https://fonts.googleapis.com/css?family=Kaushan Script' rel='stylesheet'>
	
	<embed src="Audio/enchanted-chimes.mp3" hidden="true" autostart="true" loop="true"></embed>
</head>

<style>
	body {
		background-color: black;
		height: 100vh;
		overflow: hidden;
		margin: 0;
		
		display: flex;
		flex-direction: column;
		align-items: center; /*top*/
		justify-content: center; /*left*/
	}

	.header {
		font-family: Courgette;
		color: white;
		font-size: 18px; 
		background-color: #333;
		padding: 5px;
		display: flex;
		
		align-items: center;
		width: 100%;
		
		position: fixed;
		top: 0;
	}

	.contact-us {
		flex-grow: 1;
		text-align: right;
		margin-right: 3%;
		font-family: Courgette;
	}

	.user-box {
		width: 105px; 
		height: 40px; 
		border-radius: 50px;
		background-color: black;
		opacity: 0;
		margin-right: 3%;
		
		display: flex;
		justify-content: center;
		align-items: center;	
	}
	
	.center {
		position: absolute;
		top: 5%;
		left: 93%;
		transform: translate(-50%, -50%);
	}

	.center button {
		padding: 0;
		font-family: Courgette;
		font-size: 18px; 
		font-weight: 600;
		color: black;
		background: #f5f5f5;
		border: none;
		outline: none;
		cursor: pointer;
		border-radius: 50px;
		width: 105px; 
		height: 35px; 
		margin-bottom: 6px;
		margin-right: 20px;
	}

</style>

<header class="header">
<div>
	<img src="images/Logo.png" alt="logo" width="50px" height="50px" style="margin-left: 20px">
</div>
<div class="contact-us"><a href="LP_web/W_file/About Us/About Us.html" style="text-decoration: none; color: white">Contact Us</a></div>
<div class="user-box">
</div>
</header>

<body>
	<form action="successful.html" method="POST" name="style">
	<div class="center">
		<button id="show-register">Resigter</button>
	</div>
	<div class="popup">
		<div class="close-btn">&times;</div>
	<div class="container">
		<h1 class="form-title">Registration</h1>
			<div class="main-user-info">
				<div class="user-input-box">
					<label for="fullName">Full Name</label>
					<input type="text" id="fullName" name="fullName" placeholder="Enter Full Name" required>
				</div>
				
				<div class="user-input-box">
					<label for="username">Full Username</label>
					<input type="text" id="username" name="username" placeholder="Enter Username" required>
				</div>
				
				<div class="user-input-box">
					<label for="email">Email</label>
					<input type="email" id="email" name="email" placeholder="Enter Email" required>
				</div>			
				
				<div class="user-input-box">
					<label for="Phone Number">Phone Number</label>
					<input type="text" id="phoneNumber" name="phoneNumber" placeholder="Enter Phone Number" required>
				</div>							

				<div class="user-input-box">
					<label for="Password">Password</label>
					<input type="password" id="password" name="password" placeholder="Enter Password" minlength="8" required>
				</div>			

				<div class="user-input-box">
					<label for="confrimPassword">Password</label>
					<input type="password" id="confrimPassword" name="confrimPassword" placeholder="Confirm Password" minlength="8" required>
				</div>			
			</div>
			<div class="gender-details-box">
				<span class="gender-title">Gender</span>
				<div class="gender-category">
					<input type="radio" name="gender" id="male">
					<label for="male">Male</label>
					<input type="radio" name="gender" id="female">
					<label for="female">Female</label>
					<input type="radio" name="gender" id="other">
					<label for="other">Other</label>		
				</div>
			</div>
			<div class="form-submit-btn">
				<input type="submit" value="Register">
			</div>
	</form>
	</div>
	
	<script>
		document.querySelector("#show-register").addEventListener("click", function(){
			document.querySelector(".popup").classList.add("active");
		});
		
		document.querySelector(".popup .close-btn").addEventListener("click", function(){
			document.querySelector(".popup").classList.remove("active");
		});
	</script>
</body>

</html>
